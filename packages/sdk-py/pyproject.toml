[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agent-gateway-sdk"
version = "0.1.0"
description = "Agent Gateway SDK — AgentHarness interface and types for Python harness authors"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
]

[tool.hatch.build.targets.wheel]
packages = ["agent_gateway"]
