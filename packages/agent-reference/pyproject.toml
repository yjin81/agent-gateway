[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agent-reference"
version = "0.1.0"
description = "Reference LangGraph agent for Agent Gateway v0"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.111",
    "uvicorn[standard]>=0.30",
    "langgraph>=0.2",
    "langchain-openai>=0.1",
    "langchain-community>=0.2",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "agent-gateway-sdk",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
]

[tool.hatch.build.targets.wheel]
packages = ["agent_reference"]

[tool.hatch.envs.default]
python = "3.11"

[tool.uv.sources]
agent-gateway-sdk = { path = "../sdk-py", editable = true }

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
